<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T10 v2.0</title>
<style>
body{margin:0;padding:30px;background:#111827;color:white;font-family:Arial}
.logo{text-align:center;font-size:64px;color:#D4AF37;font-weight:bold}
.sub{text-align:center;margin-bottom:20px}
.login,.panel{background:#1f2937;padding:20px;border-radius:12px;max-width:700px;margin:20px auto}
.cards{display:none;justify-content:center;gap:15px;flex-wrap:wrap}
.card{background:#1f2937;padding:20px;border-radius:12px;width:200px;cursor:pointer;text-align:center}
input,textarea{width:90%;padding:10px;margin:5px;border-radius:8px;border:none}
button{padding:10px 15px;border:none;border-radius:8px;background:#D4AF37;cursor:pointer}
.hidden{display:none}
</style>
</head>
<body>

<div class="logo">T10</div>
<div class="sub">Takip Et • Analiz Et • Geliş</div>

<div id="loginBox" class="login">
<h2>Giriş</h2>
<input id="username" placeholder="Kullanıcı Adı">
<input id="password" type="password" placeholder="Şifre">
<br><br>
<button onclick="registerUser()">Kayıt Ol</button>
<button onclick="loginUser()">Giriş Yap</button>
<p id="loginMessage"></p>
</div>

<div id="cards" class="cards">
<div class="card" onclick="togglePanel('moodPanel')">😄 Ruh Hali</div>
<div class="card" onclick="togglePanel('studyPanel')">📚 Soru Takibi</div>
<div class="card" onclick="togglePanel('helpPanel')">🆘 Yardım</div>
<div class="card" onclick="showStats()">📈 İstatistikler</div>
<div class="card" onclick="logoutUser()">🚪 Çıkış</div>
</div>

<div id="moodPanel" class="panel hidden">
<h2>Ruh Hali</h2>
<button onclick="setMood('Harika')">😄</button>
<button onclick="setMood('İyi')">🙂</button>
<button onclick="setMood('Normal')">😐</button>
<button onclick="setMood('Kötü')">😔</button>
<p id="moodResult"></p>
</div>

<div id="studyPanel" class="panel hidden">
<h2>Soru Takibi</h2>
<input id="hours" type="number" placeholder="Çalışma Saati">
<input id="questions" type="number" placeholder="Soru Sayısı">
<button onclick="saveStudy()">Kaydet</button>
<p id="studyResult"></p>
<div id="history"></div>
</div>

<div id="helpPanel" class="panel hidden">
<h2>Yardım Talebi</h2>
<textarea id="helpText" rows="4" placeholder="Notun"></textarea><br>
<button onclick="sendHelp()">Gönder</button>
<p id="helpResult"></p>
</div>

<div id="statsPanel" class="panel hidden">
<h2>İstatistikler</h2>
<p id="statsText"></p>
</div>

<script>
async function registerUser(){

const email =
document.getElementById("username").value;

const password =
document.getElementById("password").value;

try{

await createUserWithEmailAndPassword(
auth,
email,
password
);

document.getElementById("loginMessage").innerText =
"✅ Firebase hesabı oluşturuldu.";

}catch(error){

document.getElementById("loginMessage").innerText =
error.message;

}

}

async function loginUser(){

const email =
document.getElementById("username").value;

const password =
document.getElementById("password").value;

try{

await signInWithEmailAndPassword(
auth,
email,
password
);

document.getElementById("loginMessage").innerText =
"✅ Giriş başarılı.";

document.getElementById("loginBox").style.display =
"none";

document.getElementById("cards").style.display =
"flex";

}catch(error){

document.getElementById("loginMessage").innerText =
"❌ " + error.message;

}

}

function logoutUser(){

document.getElementById("cards").style.display =
"none";

document.getElementById("loginBox").style.display =
"block";

}

function togglePanel(id){

const p =
document.getElementById(id);

p.classList.toggle("hidden");

}

function setMood(m){

localStorage.setItem("t10Mood",m);

document.getElementById("moodResult").innerText =
"Bugünkü ruh halin: " + m;

}

function saveStudy(){

let arr =
JSON.parse(localStorage.getItem("t10Records"))
|| [];

arr.unshift({

d:new Date().toLocaleDateString("tr-TR"),
h:document.getElementById("hours").value,
q:document.getElementById("questions").value

});

localStorage.setItem(
"t10Records",
JSON.stringify(arr)
);

document.getElementById("studyResult").innerText =
"✅ Kaydedildi";

loadHistory();

}

function loadHistory(){

let arr =
JSON.parse(localStorage.getItem("t10Records"))
|| [];

document.getElementById("history").innerHTML =
arr.map(x =>
`<p>${x.d} - ${x.h} saat - ${x.q} soru</p>`
).join("");

}

function showStats(){

togglePanel("statsPanel");

let arr =
JSON.parse(localStorage.getItem("t10Records"))
|| [];

let h = 0;
let q = 0;

arr.forEach(x => {

h += Number(x.h || 0);
q += Number(x.q || 0);

});

document.getElementById("statsText").innerText =
`Toplam Saat: ${h} | Toplam Soru: ${q} | Kayıt: ${arr.length}`;

}

function sendHelp(){

document.getElementById("helpResult").innerText =
"✅ Talep gönderildi";

}

window.onload = function(){

loadHistory();

};
</script>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
 import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDPvUaP5Kn3jx4_IoNuOMopiR18n8NIGsU",
  authDomain: "t10v10.firebaseapp.com",
  projectId: "t10v10",
  storageBucket: "t10v10.firebasestorage.app",
  messagingSenderId: "800054218295",
  appId: "1:800054218295:web:c72da9e92cfb20124239b2",
  measurementId: "G-WZF9XBTVTR"
};

const app = initializeApp(firebaseConfig);
 const auth = getAuth(app);
const db = getFirestore(app);

window.auth = auth;
window.createUserWithEmailAndPassword = createUserWithEmailAndPassword;
window.signInWithEmailAndPassword = signInWithEmailAndPassword;
 
window.db = db;

console.log("Firebase bağlandı 🚀");

</script>
</body>
</html>
