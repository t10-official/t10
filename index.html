<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T10</title>

<style>
body{
    background:#111827;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
    padding:40px;
}

.logo{
    font-size:70px;
    font-weight:bold;
    color:#D4AF37;
}

.login-box{
    background:#1f2937;
    max-width:400px;
    margin:30px auto;
    padding:25px;
    border-radius:15px;
}

input{
    width:90%;
    padding:12px;
    margin:8px;
    border:none;
    border-radius:8px;
}

button{
    background:#D4AF37;
    color:black;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

#mainApp{
    display:none;
}

.card{
    display:inline-block;
    width:220px;
    background:#1f2937;
    margin:10px;
    padding:20px;
    border-radius:15px;
}
</style>

</head>

<body>

<div class="logo">T10</div>

<h3>Takip Et • Analiz Et • Geliş</h3>

<div id="loginBox" class="login-box">

<h2>Giriş</h2>

<input id="username" placeholder="Kullanıcı Adı">

<input id="password" type="password" placeholder="Şifre">

<br><br>

<button onclick="registerUser()">Kayıt Ol</button>

<button onclick="loginUser()">Giriş Yap</button>

<p id="loginMessage"></p>

</div>

<div id="mainApp">

<h2>Hoş Geldin</h2>

<div class="card">
😄 Ruh Hali
</div>

<div class="card">
📚 Soru Takibi
</div>

<div class="card">
🆘 Yardım Talebi
</div>

<div class="card">
📈 İstatistikler
</div>

</div>

<script>

function registerUser(){

    const username =
    document.getElementById("username").value;

    const password =
    document.getElementById("password").value;

    localStorage.setItem(
        "t10User",
        JSON.stringify({
            username: username,
            password: password
        })
    );

    document.getElementById("loginMessage").innerText =
    "✅ Kayıt oluşturuldu.";

}

function loginUser(){

    const username =
    document.getElementById("username").value;

    const password =
    document.getElementById("password").value;

    const user =
    JSON.parse(localStorage.getItem("t10User"));

    if(
        user &&
        user.username === username &&
        user.password === password
    ){

        document.getElementById("loginBox").style.display =
        "none";

        document.getElementById("mainApp").style.display =
        "block";

    }else{

        document.getElementById("loginMessage").innerText =
        "❌ Hatalı giriş.";

    }

}

</script>

</body>
</html>
