<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T10</title>

<style>

body{
    margin:0;
    padding:40px;
    font-family:Arial,sans-serif;
    background:#111827;
    color:white;
    min-height:100vh;
}

.container{
    max-width:1200px;
    margin:auto;
    text-align:center;
}

.logo{
    font-size:70px;
    font-weight:bold;
    color:#D4AF37;
}

.subtitle{
    font-size:20px;
    margin-top:10px;
    margin-bottom:25px;
}

.button{
    margin-top:15px;
    padding:15px 30px;
    border:none;
    border-radius:10px;
    background:#D4AF37;
    color:black;
    font-weight:bold;
    cursor:pointer;
}

.cards{
    margin-top:40px;
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

.card{
    background:#1f2937;
    padding:20px;
    border-radius:15px;
    width:220px;
    cursor:pointer;
}

.panel{
    margin-top:30px;
    background:#1f2937;
    padding:25px;
    border-radius:15px;
    max-width:700px;
    margin-left:auto;
    margin-right:auto;
}

input{
    padding:10px;
    margin:5px;
    border:none;
    border-radius:8px;
}

.save-btn{
    padding:12px 20px;
    background:#D4AF37;
    color:black;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}

#moodPanel{
    display:none;
}

.moods{
    font-size:40px;
    display:flex;
    justify-content:center;
    gap:20px;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">T10</div>

<div class="subtitle">
Takip Et • Analiz Et • Geliş
</div>

<button class="button">
Sisteme Giriş
</button>

<div class="cards">

<div class="card" onclick="toggleMood()">
<h3>😄 Ruh Hali</h3>
<p>Bugünkü durumunu kaydet.</p>
</div>

<div class="card" onclick="toggleStudy()">
<h3>📚 Soru Takibi</h3>
<p>Günlük soru hedeflerini izle.</p>
</div>

<div class="card">
<h3>🆘 Yardım Talebi</h3>
<p>Koçuna sessiz destek talebi gönder.</p>
</div>

</div>

<div id="moodPanel" class="panel">

<h2>Bugün Nasılsın?</h2>

<div class="moods">
<span onclick="selectMood('Harika')">😄</span>
<span onclick="selectMood('İyi')">🙂</span>
<span onclick="selectMood('Normal')">😐</span>
<span onclick="selectMood('Kötü')">😔</span>
<span onclick="selectMood('Çok Kötü')">😢</span>
</div>

<p id="moodResult">
Henüz seçim yapılmadı.
</p>

</div>

<div id="studyPanel" class="panel" style="display:block;">
<h2>Günlük Takip</h2>

<input
id="studyHours"
type="number"
placeholder="Çalışma Saati">

<input
id="questionCount"
type="number"
placeholder="Soru Sayısı">

<br><br>

<button
class="save-btn"
onclick="saveDailyData()">
Kaydet
</button>

<p id="dailyResult">
Henüz veri girilmedi.
</p>

</div>

</div>

<script>

function toggleMood(){

    const panel =
    document.getElementById("moodPanel");

    if(panel.style.display === "none" || panel.style.display === ""){
        panel.style.display = "block";
    }else{
        panel.style.display = "none";
    }

}

function selectMood(mood){

    document.getElementById("moodResult").innerText =
    "Bugünkü ruh halin: " + mood;

}

function saveDailyData(){

    const hours =
    document.getElementById("studyHours").value;

    const questions =
    document.getElementById("questionCount").value;

    document.getElementById("dailyResult").innerText =
    "Kaydedildi: " +
    hours +
    " saat çalışma, " +
    questions +
    " soru.";

}

function toggleStudy(){

    const panel =
    document.getElementById("studyPanel");

    if(panel.style.display === "none" || panel.style.display === ""){
        panel.style.display = "block";
    }else{
        panel.style.display = "none";
    }

}
</body>
</html>
