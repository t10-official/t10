<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T10</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#111827;
    color:white;
    min-height:100vh;
    padding:40px;
}

.container{
    max-width:1200px;
    margin:auto;
    text-align:center;
}

.logo{
    font-size:70px;
    font-weight:bold;
    color:#D4AF37;
}

.subtitle{
    font-size:20px;
    margin-top:10px;
}

.button{
    margin-top:30px;
    padding:15px 30px;
    border:none;
    border-radius:10px;
    background:#D4AF37;
    color:black;
    font-weight:bold;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
T10
</div>

<div class="subtitle">
Takip Et • Analiz Et • Geliş
</div>

<button class="button">
Sisteme Giriş
</button>
<div style="margin-top:40px;display:flex;gap:20px;justify-content:center;flex-wrap:wrap;">

<div style="background:#1f2937;padding:20px;border-radius:15px;width:180px;">
<h3>😄 Ruh Hali</h3>
<p>Bugünkü durumunu kaydet.</p>
</div>

<div style="background:#1f2937;padding:20px;border-radius:15px;width:180px;">
<h3>📚 Soru Takibi</h3>
<p>Günlük soru hedeflerini izle.</p>
</div>

<div style="background:#1f2937;padding:20px;border-radius:15px;width:180px;">
<h3>🆘 Yardım Talebi</h3>
<p>Koçuna sessiz destek talebi gönder.</p>
</div>

</div>
</div>
<div style="margin-top:40px;background:#1f2937;padding:25px;border-radius:15px;max-width:700px;margin-left:auto;margin-right:auto;">

<h2>Bugün Nasılsın?</h2>

<div style="font-size:40px;display:flex;justify-content:center;gap:20px;">
<span onclick="selectMood('Harika')">😄</span>
<span onclick="selectMood('İyi')">🙂</span>
<span onclick="selectMood('Normal')">😐</span>
<span onclick="selectMood('Kötü')">😔</span>
<span onclick="selectMood('Çok Kötü')">😢</span>
</div>

<p id="moodResult" style="margin-top:20px;font-size:18px;">
Henüz seçim yapılmadı.
</p>

</div>
</body>
</html>
<script>

function selectMood(mood){
    document.getElementById("moodResult").innerText =
    "Bugünkü ruh halin: " + mood;

</script>

<div style="margin-top:40px;background:#1f2937;padding:25px;border-radius:15px;max-width:700px;margin-left:auto;margin-right:auto;">

<h2>Günlük Takip</h2>

<input
id="studyHours"
type="number"
placeholder="Çalışma Saati"
style="padding:10px;margin:5px;border-radius:8px;border:none;"
>

<input
id="questionCount"
type="number"
placeholder="Soru Sayısı"
style="padding:10px;margin:5px;border-radius:8px;border:none;"
>

<br><br>

<button
onclick="saveDailyData()"
style="padding:12px 20px;background:#D4AF37;color:black;border:none;border-radius:8px;font-weight:bold;"
>
Kaydet
</button>

<p id="dailyResult">
Henüz veri girilmedi.
</p>

</div>
</body>
</html>
<script>

function saveDailyData(){

    const hours =
    document.getElementById("studyHours").value;

    const questions =
    document.getElementById("questionCount").value;

    document.getElementById("dailyResult").innerText =
    "Kaydedildi: " +
    hours +
    " saat çalışma, " +
    questions +
    " soru.";
}

</script>

</body>
</html>
